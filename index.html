<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weather App</title>

  <!-- STEP 1: Link the CSS file -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="app">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-icon active">
      <svg viewBox="0 0 24 24"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
      <span>Weather</span>
    </div>
    <div class="sidebar-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      <span>Cities</span>
    </div>
    <div class="sidebar-icon">
      <svg viewBox="0 0 24 24"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg>
      <span>Map</span>
    </div>
    <div class="sidebar-icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      <span>Settings</span>
    </div>
  </div>

  <!-- MAIN PANEL -->
  <div class="main">

    <!-- Search -->
    <div class="search-bar">
      <input type="text" id="cityInput" placeholder="Search for cities..." value="Ranchi" />
      <button onclick="searchCity()">Search</button>
    </div>

    <div class="error-msg" id="errorMsg">City not found. Try again.</div>
    <div class="status-msg"  id="loadingMsg">Loading weather data...</div>

    <div id="weatherContent">

      <!-- HERO -->
      <div class="hero">
        <div class="hero-left">
          <h2 id="cityName">--</h2>
          <div class="rain-chance" id="rainChance">Chance of rain: --%</div>
          <div class="big-temp"   id="bigTemp">--°</div>
        </div>
        <div class="hero-right">
          <div class="weather-emoji" id="heroIcon">🌡️</div>
        </div>
      </div>

      <!-- TODAY'S HOURLY FORECAST -->
      <div class="section-card">
        <div class="section-label">Today's forecast</div>
        <div class="hourly-row" id="hourlyRow"></div>
      </div>

      <!-- AIR CONDITIONS -->
      <div class="section-card">
        <div class="air-header">
          <div class="section-label">Air conditions</div>
          <button class="see-more">See more</button>
        </div>
        <div class="air-grid">
          <div class="air-item">
            <div class="air-label">🌡️ Real feel</div>
            <div class="air-val" id="realFeel">--</div>
          </div>
          <div class="air-item">
            <div class="air-label">💨 Wind</div>
            <div class="air-val" id="windSpeed">--</div>
          </div>
          <div class="air-item">
            <div class="air-label">🌧️ Chance of rain</div>
            <div class="air-val" id="rainVal">--</div>
          </div>
          <div class="air-item">
            <div class="air-label">☀️ UV index</div>
            <div class="air-val" id="uvIndex">--</div>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- RIGHT PANEL — 7-day forecast -->
  <div class="right-panel">
    <div class="section-label">7-Day Forecast</div>
    <div id="forecastList"></div>
  </div>

</div>

  <!-- STEP 2: Link the JavaScript file — always at the BOTTOM of body -->
  <script src="script.js"></script>

</body>
</html>
